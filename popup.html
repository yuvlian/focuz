<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>focuz</title>
  <style>
    body {
      width: 320px;
      font-family: system-ui, sans-serif;
      padding: 12px;
      margin: 0;
      color: #333;
    }

    h2 {
      margin: 0 0 2px 0;
      font-size: 1.2rem;
    }

    .repo-link {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 14px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 0.9rem;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .2s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .2s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: #2196F3;
    }

    input:checked+.slider:before {
      transform: translateX(14px);
    }

    .adv-panel {
      display: none;
      border-top: 1px solid #eee;
      padding-top: 10px;
      margin-top: 10px;
    }

    .adv-title {
      font-size: 0.9rem;
      font-weight: bold;
      color: #666;
      cursor: pointer;
      margin-bottom: 8px;
      user-select: none;
    }

    .adv-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 0.9rem;
      padding-left: 5px;
    }

    .fps-input {
      width: 45px;
      font-size: 0.8rem;
      text-align: center;
    }

    .notice {
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid #eee;
      font-size: 0.8rem;
      color: #888;
      text-align: center;
      font-style: italic;
    }
  </style>
</head>

<body>
  <h2>focuz</h2>
  <div class="repo-link">github.com/yuvlian/focuz</div>

  <div class="row">
    <span>Enable globally</span>
    <label class="switch"><input type="checkbox" id="globalToggle" /><span class="slider"></span></label>
  </div>
  <div class="row">
    <span>Disable for this tab</span>
    <label class="switch"><input type="checkbox" id="tabToggle" /><span class="slider"></span></label>
  </div>

  <div class="adv-title" id="advMenuBtn">▶ Advanced Settings</div>
  <div class="adv-panel" id="advPanel">
    <div class="adv-row">
      <span>Block Focus/Blur Events</span>
      <input type="checkbox" id="blockFocus" checked />
    </div>
    <div class="adv-row">
      <span>Block Visibility Changes</span>
      <input type="checkbox" id="blockVisibility" checked />
    </div>
    <div class="adv-row">
      <span>Block Mouse Leave/Enter</span>
      <input type="checkbox" id="blockMouse" checked />
    </div>
    <div class="adv-row">
      <span>Spoof requestAnimationFrame</span>
      <input type="checkbox" id="spoofRaf" checked />
    </div>
    <div class="adv-row">
      <span>Background FPS Limit</span>
      <input type="number" id="fpsLimit" class="fps-input" value="60" min="1" max="60" />
    </div>
  </div>

  <div class="notice">
    Refresh the tabs for any changes to take effect!
  </div>

  <script src="popup.js"></script>
</body>

</html>
